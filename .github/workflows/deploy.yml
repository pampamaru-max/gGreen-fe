name: Deploy Next.js via Docker

on:
  push:
    branches:
      - main # ⚠️ ถ้า branch ของคุณชื่ออื่น (เช่น dev หรือ master) อย่าลืมแก้นะครับ

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 🔑 Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: 🏗️ Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # 💡 เปลี่ยนชื่อกล่องเป็น ggreen-fe ให้ตรงกับโปรเจกต์
          tags: ${{ secrets.DOCKER_USERNAME }}/ggreen-fe:latest

      - name: 🚀 Deploy to GCP
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            # 1. สั่ง Server ให้ไปดึงกล่อง Image ggreen-fe ล่าสุดจาก Docker Hub
            docker pull ${{ secrets.DOCKER_USERNAME }}/ggreen-fe:latest
            
            # 2. ปิดและลบ Container ตัวเก่าทิ้ง (ถ้ามีรันอยู่)
            docker stop ggreen-fe || true
            docker rm ggreen-fe || true
            
            # 3. สั่งรัน Container ตัวใหม่ผูกกับพอร์ต 3000
            docker run -d --name ggreen-fe -p 3000:3000 --restart unless-stopped ${{ secrets.DOCKER_USERNAME }}/ggreen-fe:latest
            
            # 4. ลบไฟล์ขยะทิ้งเพื่อคืนพื้นที่ให้ Server
            docker image prune -f