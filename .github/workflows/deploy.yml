name: Deploy Next.js via Docker

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 🔑 Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: 🏗️ Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # แพ็กใส่กล่องชื่อ my-next-app แล้วส่งไปเก็บที่ Docker Hub
          tags: ${{ secrets.DOCKER_USERNAME }}/my-next-app:latest

      - name: 🚀 Deploy to GCP
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            # 1. สั่ง Server ให้ไปดึงกล่อง Image ล่าสุดจาก Docker Hub
            sudo docker pull ${{ secrets.DOCKER_USERNAME }}/my-next-app:latest
            
            # 2. ปิดและลบแอปตัวเก่าทิ้ง (ถ้ามีรันอยู่)
            sudo docker stop my-next-app || true
            sudo docker rm my-next-app || true
            
            # 3. สั่งรันแอปตัวใหม่ผูกกับพอร์ต 3000
            sudo docker run -d --name my-next-app -p 3000:3000 --restart unless-stopped ${{ secrets.DOCKER_USERNAME }}/my-next-app:latest
            
            # 4. ลบไฟล์ขยะทิ้งเพื่อคืนพื้นที่ให้ Server
            sudo docker image prune -f